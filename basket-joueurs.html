<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liste des Joueurs — Tournoi Pays de Montaigu Basket</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #E8761A;
    --orange-light: #F5903A;
    --orange-dark: #C05A0A;
    --grey-dark: #2D2D2D;
    --grey-mid: #4A4A4A;
    --grey-light: #F2F2F2;
    --grey-border: #E0E0E0;
    --white: #FAFAFA;
    --text: #1C1C1C;
    --text-muted: #6B6B6B;
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--grey-light);
    color: var(--text);
    min-height: 100dvh;
  }

  /* HEADER */
  header {
    background: var(--grey-dark);
    padding: 20px 16px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--orange);
  }

  .header-inner {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo {
    width: 52px;
    height: 52px;
    object-fit: contain;
    flex-shrink: 0;
  }

  .header-text {}
  .header-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    color: var(--orange);
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .header-title {
    font-size: 17px;
    font-weight: 800;
    color: var(--white);
    line-height: 1.1;
  }
  .header-sub {
    font-size: 11px;
    color: #999;
    margin-top: 2px;
  }

  /* SEARCH + FILTERS */
  .controls {
    background: var(--white);
    border-bottom: 1px solid var(--grey-border);
    padding: 14px 16px;
    position: sticky;
    top: 95px;
    z-index: 99;
  }

  .controls-inner {
    max-width: 680px;
    margin: 0 auto;
  }

  .search-wrap {
    position: relative;
    margin-bottom: 12px;
  }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }

  input[type="search"] {
    width: 100%;
    padding: 10px 12px 10px 38px;
    border: 1.5px solid var(--grey-border);
    border-radius: 10px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    background: var(--grey-light);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="search"]:focus { border-color: var(--orange); }
  input[type="search"]::placeholder { color: #aaa; }

  .filter-group { margin-bottom: 10px; }
  .filter-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .filter-pills {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  .filter-pills::-webkit-scrollbar { display: none; }

  .pill {
    flex-shrink: 0;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    border: 1.5px solid var(--grey-border);
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .pill:hover { border-color: var(--orange); color: var(--orange); }
  .pill.active {
    background: var(--orange);
    border-color: var(--orange);
    color: white;
  }

  /* RESULTS COUNT */
  .results-bar {
    max-width: 680px;
    margin: 0 auto;
    padding: 10px 16px 4px;
  }
  .results-count {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
  }
  .results-count strong { color: var(--orange); font-weight: 700; }

  /* TEAM SECTIONS */
  .content {
    max-width: 680px;
    margin: 0 auto;
    padding: 4px 16px 40px;
  }

  .team-section { margin-bottom: 8px; }

  .team-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 0 6px;
  }

  .team-name {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .team-line {
    flex: 1;
    height: 1px;
    background: var(--grey-border);
  }

  .team-count {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
  }

  /* PLAYER CARD */
  .player-card {
    background: white;
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1.5px solid transparent;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .player-card:hover {
    border-color: var(--orange);
    box-shadow: 0 2px 12px rgba(232,118,26,0.08);
  }

  .player-number {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--grey-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 800;
    color: var(--orange);
    flex-shrink: 0;
    letter-spacing: -0.5px;
  }

  .player-info { flex: 1; min-width: 0; }
  .player-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-meta {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .player-poste {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 6px;
    background: var(--grey-light);
    color: var(--text-muted);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .player-poste.meneur { background: #FFF3E8; color: #C05A0A; }
  .player-poste.arriere { background: #E8F4FF; color: #1A6EC0; }
  .player-poste.ailier { background: #E8FFE8; color: #1A7A1A; }
  .player-poste.ailier-fort { background: #F5E8FF; color: #7A1AC0; }
  .player-poste.pivot { background: #FFE8E8; color: #C01A1A; }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 48px 24px;
    display: none;
  }
  .empty-icon {
    font-size: 40px;
    margin-bottom: 12px;
    opacity: 0.3;
  }
  .empty-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .empty-sub { font-size: 13px; color: #bbb; }

  /* DEMO BANNER */
  .demo-banner {
    background: #FFF8E8;
    border: 1.5px solid #F5C842;
    border-radius: 10px;
    padding: 10px 14px;
    margin: 12px 16px;
    max-width: 680px;
    margin-left: auto;
    margin-right: auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .demo-banner-text {
    font-size: 12px;
    font-weight: 600;
    color: #8A6A00;
  }
</style>
</head>

<script>
const JOUEURS = JSON.parse(document.getElementById('d-joueurs').textContent);

const EQUIPES = [...new Set(JOUEURS.map(j => j.equipe))].sort();
const POSTE_CLASS = {
  "Meneur": "meneur",
  "Arrière": "arriere",
  "Ailier": "ailier",
  "Ailier fort": "ailier-fort",
  "Pivot": "pivot"
};

let activeEquipe = 'all';
let activePoste = 'all';
let searchTerm = '';

// Build equipe pills
const equipePills = document.getElementById('equipe-pills');
EQUIPES.forEach(eq => {
  const btn = document.createElement('button');
  btn.className = 'pill';
  btn.dataset.equipe = eq;
  btn.textContent = eq;
  equipePills.appendChild(btn);
});

// Pill interactions
document.getElementById('equipe-pills').addEventListener('click', e => {
  if (!e.target.classList.contains('pill')) return;
  document.querySelectorAll('#equipe-pills .pill').forEach(p => p.classList.remove('active'));
  e.target.classList.add('active');
  activeEquipe = e.target.dataset.equipe;
  render();
});

document.getElementById('poste-pills').addEventListener('click', e => {
  if (!e.target.classList.contains('pill')) return;
  document.querySelectorAll('#poste-pills .pill').forEach(p => p.classList.remove('active'));
  e.target.classList.add('active');
  activePoste = e.target.dataset.poste;
  render();
});

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  render();
});

function normalize(str) {
  return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function render() {
  const filtered = JOUEURS.filter(j => {
    if (activeEquipe !== 'all' && j.equipe !== activeEquipe) return false;
    if (activePoste !== 'all' && j.poste !== activePoste) return false;
    if (searchTerm) {
      const haystack = normalize(`${j.prenom} ${j.nom} ${j.equipe} ${j.poste}`);
      if (!haystack.includes(searchTerm)) return false;
    }
    return true;
  });

  document.getElementById('count').textContent = filtered.length;

  const content = document.getElementById('content');
  const empty = document.getElementById('empty');

  if (filtered.length === 0) {
    content.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  // Group by team
  const byTeam = {};
  filtered.forEach(j => {
    if (!byTeam[j.equipe]) byTeam[j.equipe] = [];
    byTeam[j.equipe].push(j);
  });

  let html = '';
  Object.entries(byTeam).sort(([a],[b]) => a.localeCompare(b)).forEach(([equipe, joueurs]) => {
    html += `<div class="team-section">
      <div class="team-header">
        <span class="team-name">${equipe}</span>
        <div class="team-line"></div>
        <span class="team-count">${joueurs.length} joueur${joueurs.length > 1 ? 's' : ''}</span>
      </div>`;
    joueurs.forEach(j => {
      const posteClass = POSTE_CLASS[j.poste] || '';
      html += `<div class="player-card">
        <div class="player-number">${j.numero}</div>
        <div class="player-info">
          <div class="player-name">${j.prenom} ${j.nom.toUpperCase()}</div>
          <div class="player-meta">${j.age} ans · ${j.equipe}</div>
        </div>
        <div class="player-poste ${posteClass}">${j.poste}</div>
      </div>`;
    });
    html += '</div>';
  });

  content.innerHTML = html;
}

render();
</script>
</body>
</html>
